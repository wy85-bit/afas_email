name: Copy Hours Script
on:
  repository_dispatch:
    types: [copy_hours_trigger]

jobs:
  copy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests flask requests # Add any other libraries your script needs here

      - name: Run Worker Script
        env:
          AFAS_TOKEN: ${{ secrets.AFAS_TOKEN }} 
        # Point this to copy_hours.py, NOT api/index.py
        run: python api/copy_hours.py --user ${{ github.event.client_payload.user }}



